<!DOCTYPE html>
<html>
<head>
<title>Generate Report — Ultra Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
:root{ --blue1:#4facfe; --blue2:#00c6ff; --dark:#1a2340; }
body{ background:linear-gradient(135deg,var(--blue1),var(--blue2)); min-height:100vh; display:flex; align-items:center; justify-content:center; }
#gate{ text-align:center; color:white; }
.spinner{ width:52px; height:52px; border:4px solid rgba(255,255,255,0.2); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
@keyframes spin{ to{ transform:rotate(360deg); } }
#gate p{ font-size:13px; opacity:0.5; letter-spacing:2px; text-transform:uppercase; }
#app{ display:none; }
body.ready{ background:#f0f4ff; display:block; }
</style>
</head>
<body>

<!-- BLANK PAGE — no form or user content in HTML source -->
<div id="gate">
  <div class="spinner"></div>
  <p>Verifying Access…</p>
</div>
<div id="app"></div>

<script>
const BASE = "https://prototype-backend-657r.onrender.com";

(async function boot() {
  try {
    const res = await fetch(BASE + "/api/auth/check", { credentials: "include" });
    const data = await res.json();
    if (!data.loggedIn) { window.location.replace("userlogin.html"); return; }
  } catch (e) { window.location.replace("userlogin.html"); return; }

  document.getElementById("gate").remove();
  document.body.className = "ready";
  const app = document.getElementById("app");
  app.style.display = "block";

  app.innerHTML = `
    <style>
      header{ background:var(--dark); padding:0 36px; display:flex; align-items:center; justify-content:space-between; height:64px; box-shadow:0 4px 24px rgba(0,0,0,0.35); position:sticky; top:0; z-index:200; }
      .logo{ display:flex; align-items:center; gap:10px; cursor:pointer; }
      .logo-icon{ width:38px; height:38px; background:linear-gradient(135deg,var(--blue1),var(--blue2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
      .logo-text{ font-family:'Playfair Display',serif; color:white; font-size:16px; line-height:1.1; }
      .logo-text span{ display:block; font-size:10px; font-weight:300; color:rgba(255,255,255,0.45); letter-spacing:2px; text-transform:uppercase; }
      .nav-link{ padding:8px 15px; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; background:transparent; color:rgba(255,255,255,0.55); text-decoration:none; }
      .nav-link:hover{ background:rgba(255,255,255,0.1); color:white; }
      .nav-divider{ width:1px; height:22px; background:rgba(255,255,255,0.12); margin:0 4px; display:inline-block; vertical-align:middle; }
      .logout-btn{ padding:8px 15px; border:1px solid rgba(255,80,80,0.4); border-radius:8px; font-size:13px; cursor:pointer; background:transparent; color:rgba(255,120,120,0.8); }
      .logout-btn:hover{ background:rgba(255,80,80,0.15); color:#ff6b6b; }
      .page{ padding:36px; }
      .container{ background:white; border-radius:16px; padding:36px; max-width:860px; margin:auto; box-shadow:0 20px 60px rgba(0,0,0,0.10); }
      .page-title{ font-family:'Playfair Display',serif; font-size:22px; color:var(--dark); margin-bottom:28px; padding-bottom:14px; border-bottom:2px solid #f0f4ff; }
      .section-label{ font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:#888; font-weight:600; margin:22px 0 8px; }
      .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
      .grid-3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
      .fi{ width:100%; padding:11px 14px; border-radius:9px; border:1.5px solid #e0e7ff; font-size:14px; font-family:'Poppins',sans-serif; outline:none; transition:border 0.2s; color:#333; box-sizing:border-box; }
      .fi:focus{ border-color:var(--blue1); }
      .add-btn{ padding:9px 18px; background:#f0f4ff; color:var(--dark); border:1.5px solid #d0d8f0; border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; margin-top:8px; }
      .add-btn:hover{ background:#e0e8ff; }
      .extra-row{ display:flex; gap:10px; margin-top:8px; }
      .extra-row .fi{ flex:1; }
      .remove-btn{ padding:0 12px; background:#fff0f0; border:1.5px solid #ffd0d0; border-radius:8px; cursor:pointer; color:#ff4757; font-size:18px; font-weight:700; }
      .remove-btn:hover{ background:#ffe0e0; }
      .submit-btn{ width:100%; padding:15px; margin-top:28px; background:linear-gradient(135deg,var(--blue1),var(--blue2)); color:white; border:none; border-radius:11px; font-size:16px; font-weight:700; cursor:pointer; transition:0.3s; }
      .submit-btn:hover{ opacity:0.88; transform:translateY(-2px); box-shadow:0 10px 30px rgba(79,172,254,0.4); }
      .submit-btn:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }
      #statusMsg{ margin-top:14px; text-align:center; font-size:14px; color:#2ed573; min-height:20px; font-weight:500; }
      #statusMsg.error{ color:#ff4757; }
      footer{ background:var(--dark); color:rgba(255,255,255,0.45); padding:18px 36px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
      .footer-left{ font-size:13px; }
      .footer-left strong{ color:var(--blue1); }
      .footer-right{ display:flex; gap:18px; }
      .footer-right a{ color:rgba(255,255,255,0.35); text-decoration:none; font-size:12px; }
      .footer-right a:hover{ color:var(--blue1); }
    </style>

    <header>
      <div class="logo" onclick="location.href='index.html'">
        <div class="logo-icon">🦷</div>
        <div class="logo-text">Ultra Report <span>Dental Camp System</span></div>
      </div>
      <nav style="display:flex;gap:4px;align-items:center">
        <a class="nav-link" href="index.html">🏠 Home</a>
        <span class="nav-divider"></span>
        <button class="logout-btn" onclick="doLogout()">⏏ Logout</button>
      </nav>
    </header>

    <div class="page">
    <div class="container">
      <div class="page-title">📋 Generate Dental Camp Report</div>

      <div class="section-label">Camp Details</div>
      <div class="grid-2">
        <input class="fi" id="collegeName" placeholder="College Name">
        <input class="fi" id="departmentName" placeholder="Department Name">
        <input class="fi" id="campLocation" placeholder="Camp Location">
        <input class="fi" id="associationName" placeholder="Association Name">
        <input class="fi" id="projectName" placeholder="Project Name">
        <input class="fi" id="reportDateShort" placeholder="Short Date (e.g. 10/03/2026)">
      </div>
      <div style="margin-top:12px"><input class="fi" id="reportDateLong" placeholder="Long Date (e.g. 10th March 2026)"></div>

      <div class="section-label">Timings &amp; Team</div>
      <div class="grid-3">
        <input class="fi" id="startTime" placeholder="Start Time">
        <input class="fi" id="endTime" placeholder="End Time">
        <input class="fi" id="staffCount" placeholder="Staff Count">
        <input class="fi" id="postgraduateCount" placeholder="Postgraduate Count">
        <input class="fi" id="internCount" placeholder="Intern Count">
      </div>

      <div class="section-label">Patient Summary</div>
      <div class="grid-3">
        <input class="fi" id="totalPatients" placeholder="Total Patients">
        <input class="fi" id="treatmentCount" placeholder="Treatment Count">
        <input class="fi" id="maleCount" placeholder="Male Count">
        <input class="fi" id="femaleCount" placeholder="Female Count">
      </div>

      <div class="section-label">Screening Statistics</div>
      <div class="grid-3">
        <input class="fi" id="dentalCaries" placeholder="Dental Caries">
        <input class="fi" id="gingivitis" placeholder="Gingivitis">
        <input class="fi" id="missing" placeholder="Missing">
      </div>
      <div id="extraScreening"></div>
      <button class="add-btn" onclick="addScreening()">+ Add Diagnosis</button>

      <div class="section-label">Treatment Statistics</div>
      <input class="fi" id="scaling" placeholder="Scaling" style="margin-bottom:8px">
      <div id="extraTreatment"></div>
      <button class="add-btn" onclick="addTreatment()">+ Add Treatment</button>

      <div class="section-label">Upload Photos</div>
      <input class="fi" type="file" id="photos" multiple accept="image/*">

      <button class="submit-btn" onclick="generate()" id="generateBtn">⚡ Generate Report</button>
      <div id="statusMsg"></div>
    </div>
    </div>

    <footer>
      <div class="footer-left">© 2026 <strong>Ultra College</strong> — Dental Camp Report System</div>
      <div class="footer-right">
        <a href="index.html">Home</a>
        <a href="adminlogin.html">Admin Login</a>
      </div>
    </footer>
  `;
})();

async function doLogout() {
  await fetch(BASE + "/api/logout", { method: "POST", credentials: "include" });
  window.location.replace("userlogin.html");
}

function addScreening() {
  const div = document.createElement("div"); div.className = "extra-row";
  div.innerHTML = `<input class="fi" placeholder="Diagnosis Name" class="diagnosisName"><input class="fi" placeholder="Patient Count" class="diagnosisValue"><button class="remove-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById("extraScreening").appendChild(div);
}

function addTreatment() {
  const div = document.createElement("div"); div.className = "extra-row";
  div.innerHTML = `<input class="fi" placeholder="Treatment Name" class="treatmentName"><input class="fi" placeholder="Patient Count" class="treatmentValue"><button class="remove-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById("extraTreatment").appendChild(div);
}

async function generate() {
  const btn = document.getElementById("generateBtn");
  const msg = document.getElementById("statusMsg");
  btn.disabled = true; btn.textContent = "⏳ Generating...";
  msg.textContent = ""; msg.className = "";

  const get = (id) => document.getElementById(id)?.value || "";
  const formData = new FormData();
  ["collegeName","departmentName","campLocation","associationName","projectName",
   "reportDateShort","reportDateLong","startTime","endTime","staffCount","postgraduateCount",
   "internCount","totalPatients","treatmentCount","maleCount","femaleCount",
   "dentalCaries","gingivitis","missing","scaling"].forEach(f => formData.append(f, get(f)));

  const extraScreening = [];
  document.querySelectorAll("#extraScreening .extra-row").forEach(row => {
    const inputs = row.querySelectorAll("input");
    if (inputs[0].value && inputs[1].value) extraScreening.push({ name: inputs[0].value, value: inputs[1].value });
  });
  if (extraScreening.length) formData.append("extraScreening", JSON.stringify(extraScreening));

  const extraTreatment = [];
  document.querySelectorAll("#extraTreatment .extra-row").forEach(row => {
    const inputs = row.querySelectorAll("input");
    if (inputs[0].value && inputs[1].value) extraTreatment.push({ name: inputs[0].value, value: inputs[1].value });
  });
  if (extraTreatment.length) formData.append("extraTreatment", JSON.stringify(extraTreatment));

  const photoFiles = document.getElementById("photos").files;
  for (let i = 0; i < photoFiles.length; i++) formData.append("photos", photoFiles[i]);

  try {
    const res = await fetch(BASE + "/api/report/generate", { method: "POST", credentials: "include", body: formData });
    if (res.status === 403) { window.location.replace("userlogin.html"); return; }
    if (!res.ok) throw new Error("Server error: " + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="Camp_Report.docx";
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    msg.textContent = "✅ Report generated and downloaded successfully!";
  } catch (err) {
    msg.textContent = "❌ Error: " + err.message;
    msg.className = "error";
  }

  btn.disabled = false; btn.textContent = "⚡ Generate Report";
}
</script>
</body>
</html>
