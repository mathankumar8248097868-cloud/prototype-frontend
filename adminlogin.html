<!DOCTYPE html>
<html>
<head>
<title>Admin Login — Ultra Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
:root{ --blue1:#4facfe; --blue2:#00c6ff; --dark:#1a2340; }
body{ background:linear-gradient(135deg,var(--blue1),var(--blue2)); min-height:100vh; display:flex; flex-direction:column; }

/* ── HEADER ── */
header{ background:var(--dark); padding:0 36px; display:flex; align-items:center; justify-content:space-between; height:64px; box-shadow:0 4px 24px rgba(0,0,0,0.35); position:sticky; top:0; z-index:200; }
.logo{ display:flex; align-items:center; gap:10px; text-decoration:none; cursor:pointer; }
.logo-icon{ width:38px; height:38px; background:linear-gradient(135deg,var(--blue1),var(--blue2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.logo-text{ font-family:'Playfair Display',serif; color:white; font-size:16px; line-height:1.1; }
.logo-text span{ display:block; font-family:'Poppins',sans-serif; font-size:10px; font-weight:300; color:rgba(255,255,255,0.45); letter-spacing:2px; text-transform:uppercase; }
nav{ display:flex; gap:4px; align-items:center; }
.nav-link{ padding:8px 15px; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; background:transparent; color:rgba(255,255,255,0.55); text-decoration:none; display:flex; align-items:center; gap:6px; }
.nav-link:hover{ background:rgba(255,255,255,0.1); color:white; }
.nav-link.active{ background:rgba(79,172,254,0.18); color:var(--blue1); }
.nav-divider{ width:1px; height:22px; background:rgba(255,255,255,0.12); margin:0 4px; }

/* ── CENTER ── */
.center{ flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
.box{ width:380px; padding:44px 40px; border-radius:20px; background:rgba(255,255,255,0.15); backdrop-filter:blur(16px); box-shadow:0 20px 50px rgba(0,0,0,0.25); text-align:center; color:white; }
.box-icon{ font-size:40px; margin-bottom:10px; }
.box h2{ font-family:'Playfair Display',serif; font-size:22px; margin-bottom:6px; }
.box p{ font-size:13px; opacity:0.65; margin-bottom:28px; }
input{ width:100%; padding:13px 15px; margin:8px 0; border-radius:10px; border:none; font-size:14px; background:rgba(255,255,255,0.9); color:#333; outline:none; }
input:focus{ background:white; }
button{ width:100%; padding:14px; margin-top:14px; border:none; border-radius:10px; background:var(--dark); color:white; font-size:15px; font-weight:600; cursor:pointer; transition:0.3s; letter-spacing:0.5px; }
button:hover{ background:#0f1a30; transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
#msg{ margin-top:14px; color:#ffdede; font-size:13px; min-height:20px; }

/* ── FOOTER ── */
footer{ background:var(--dark); color:rgba(255,255,255,0.45); padding:18px 36px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.footer-left{ font-size:13px; display:flex; align-items:center; gap:8px; }
.footer-left strong{ color:var(--blue1); font-weight:600; }
.footer-dot{ width:6px; height:6px; background:var(--blue1); border-radius:50%; display:inline-block; flex-shrink:0; }
.footer-right{ display:flex; gap:18px; }
.footer-right a{ color:rgba(255,255,255,0.35); text-decoration:none; font-size:12px; transition:color 0.2s; }
.footer-right a:hover{ color:var(--blue1); }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo" onclick="location.href='index.html'">
    <div class="logo-icon">🦷</div>
    <div class="logo-text">Ultra Report <span>Dental Camp System</span></div>
  </div>
  <nav>
    <a class="nav-link" href="index.html">🏠 Home</a>
    <div class="nav-divider"></div>
    <a class="nav-link" href="userlogin.html">👤 User Login</a>
    <a class="nav-link active" href="adminlogin.html">🔐 Admin</a>
  </nav>
</header>

<!-- ── LOGIN CARD ── -->
<div class="center">
  <div class="box">
    <div class="box-icon">🔐</div>
    <h2>Admin Login</h2>
    <p>Restricted access — authorised personnel only</p>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</div>

<!-- ── FOOTER ── -->
<footer>
  <div class="footer-left">
    <span class="footer-dot"></span>
    <span>© 2026 <strong>Ultra College</strong> — Dental Camp Report System</span>
  </div>
  <div class="footer-right">
    <a href="index.html">Home</a>
    <a href="userlogin.html">User Login</a>
    <a href="adminlogin.html">Admin Login</a>
  </div>
</footer>

<script>
const BASE = "https://prototype-backend-657r.onrender.com";

async function login() {
  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();
  if (!u || !p) { document.getElementById("msg").innerText = "Please fill all fields"; return; }

  document.querySelector("button").textContent = "Logging in...";
  document.querySelector("button").disabled = true;

  try {
    const res = await fetch(BASE + "/api/admin/login", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.success) {
      // ✅ Redirect to BACKEND protected route — not GitHub Pages
      window.location.href = BASE + "/page/admin";
    } else {
      document.getElementById("msg").innerText = "Invalid Admin Credentials";
      document.querySelector("button").textContent = "Login";
      document.querySelector("button").disabled = false;
    }
  } catch (err) {
    document.getElementById("msg").innerText = "Server error. Try again.";
    document.querySelector("button").textContent = "Login";
    document.querySelector("button").disabled = false;
  }
}

// Allow Enter key to submit
document.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
