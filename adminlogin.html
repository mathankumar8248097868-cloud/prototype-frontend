<!DOCTYPE html>
<html lang="en">
<head>
<title>Admin Login — Ultra Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
:root{
  --ink:#0d1117; --ink2:#1e2b3c;
  --sky:#2563eb; --accent:#0ea5e9;
  --silver:#f4f7fb; --muted:#64748b;
  --white:#ffffff; --border:#e2e8f0;
  --danger:#ef4444;
  --amber:#f59e0b;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--ink);
  color:var(--ink);
  min-height:100vh;
  display:flex; flex-direction:column;
}

/* ── HEADER ── */
header{
  position:sticky; top:0; z-index:500;
  background:rgba(13,17,23,0.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  padding:0 48px; height:68px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo{ display:flex; align-items:center; gap:12px; text-decoration:none; cursor:pointer; }
.logo-mark{
  width:40px; height:40px;
  background:linear-gradient(135deg,var(--sky),var(--accent));
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:18px; box-shadow:0 4px 14px rgba(37,99,235,0.3);
}
.logo-name{ font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:white; }
.logo-sub{ font-size:10px; color:rgba(255,255,255,0.35); font-weight:400; letter-spacing:1.5px; text-transform:uppercase; display:block; margin-top:-2px; }
nav{ display:flex; align-items:center; gap:6px; }
.nav-pill{ padding:8px 18px; border-radius:100px; font-size:13px; font-weight:500; text-decoration:none; color:rgba(255,255,255,0.4); transition:all 0.2s; display:flex; align-items:center; gap:6px; background:transparent; border:1px solid transparent; cursor:pointer; }
.nav-pill:hover{ color:rgba(255,255,255,0.9); background:rgba(255,255,255,0.06); }
.nav-pill.active{ color:var(--accent); background:rgba(14,165,233,0.1); border-color:rgba(14,165,233,0.2); }
.nav-sep{ width:1px; height:20px; background:rgba(255,255,255,0.1); margin:0 6px; }

/* ── MAIN ── */
.page{
  flex:1;
  display:flex; align-items:center; justify-content:center;
  padding:60px 24px;
  position:relative; overflow:hidden;
  background:linear-gradient(145deg, #0d1117 0%, #0f172a 50%, #0d1b2a 100%);
}
/* glow orbs */
.page::before{
  content:'';
  position:absolute; top:10%; left:15%;
  width:500px; height:500px;
  background:radial-gradient(circle, rgba(37,99,235,0.12) 0%, transparent 70%);
  border-radius:50%; pointer-events:none;
}
.page::after{
  content:'';
  position:absolute; bottom:10%; right:10%;
  width:400px; height:400px;
  background:radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
  border-radius:50%; pointer-events:none;
}

.card{
  position:relative; z-index:2;
  width:100%; max-width:420px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;
  padding:48px 44px;
  box-shadow:0 32px 80px rgba(0,0,0,0.5);
}
.card-badge{
  display:inline-flex; align-items:center; gap:7px;
  background:rgba(245,158,11,0.12);
  border:1px solid rgba(245,158,11,0.25);
  border-radius:100px;
  padding:5px 14px;
  font-size:11px; font-weight:600; color:var(--amber);
  letter-spacing:1px; text-transform:uppercase;
  margin-bottom:22px;
}
.card-badge span{ width:5px; height:5px; background:var(--amber); border-radius:50%; display:inline-block; }
.card-title{
  font-family:'Cormorant Garamond',serif;
  font-size:30px; font-weight:700;
  color:white; margin-bottom:6px;
}
.card-sub{ font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:32px; }
.field-label{ font-size:12px; font-weight:600; color:rgba(255,255,255,0.6); letter-spacing:0.3px; margin-bottom:6px; display:block; }
.field-wrap{ position:relative; margin-bottom:16px; }
.field-wrap input{
  width:100%; padding:13px 16px;
  border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.1);
  font-size:14px; font-family:'DM Sans',sans-serif;
  color:white; background:rgba(255,255,255,0.06); outline:none;
  transition:all 0.2s;
}
.field-wrap input::placeholder{ color:rgba(255,255,255,0.25); }
.field-wrap input:focus{
  border-color:rgba(37,99,235,0.7);
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 0 3px rgba(37,99,235,0.12);
}
.submit-btn{
  width:100%; padding:14px;
  margin-top:10px;
  background:linear-gradient(135deg,var(--sky),var(--accent));
  color:white; border:none; border-radius:10px;
  font-size:14px; font-weight:600; font-family:'DM Sans',sans-serif;
  cursor:pointer; letter-spacing:0.3px;
  transition:all 0.25s;
  box-shadow:0 6px 20px rgba(37,99,235,0.35);
}
.submit-btn:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 10px 28px rgba(37,99,235,0.5); }
.submit-btn:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }
#msg{ margin-top:14px; font-size:13px; color:#fca5a5; min-height:18px; text-align:center; font-weight:500; }

/* ── FOOTER ── */
footer{
  background:rgba(0,0,0,0.4);
  color:rgba(255,255,255,0.3);
  padding:18px 48px;
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:12px;
}
.footer-brand-name{ font-size:13px; color:rgba(255,255,255,0.5); font-weight:500; }
.footer-brand-name strong{ color:var(--accent); }
.footer-links{ display:flex; gap:20px; }
.footer-links a{ color:rgba(255,255,255,0.25); text-decoration:none; font-size:12px; transition:color 0.2s; }
.footer-links a:hover{ color:var(--accent); }

@media(max-width:600px){
  header{ padding:0 20px; }
  footer{ padding:16px 20px; }
  .card{ padding:36px 28px; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-mark">🦷</div>
    <div>
      <div class="logo-name">Ultra Report</div>
      <span class="logo-sub">Dental Camp System</span>
    </div>
  </a>
  <nav>
    <a class="nav-pill" href="index.html">Home</a>
    <div class="nav-sep"></div>
    <a class="nav-pill" href="userlogin.html">👤 User Login</a>
    <a class="nav-pill active" href="adminlogin.html">🔐 Admin</a>
  </nav>
</header>

<div class="page">
  <div class="card">
    <div class="card-badge"><span></span> Restricted Access</div>
    <div class="card-title">Admin Login</div>
    <div class="card-sub">Authorised personnel only</div>

    <label class="field-label">Username</label>
    <div class="field-wrap">
      <input id="user" placeholder="Admin username" autocomplete="username">
    </div>
    <label class="field-label">Password</label>
    <div class="field-wrap">
      <input id="pass" type="password" placeholder="Admin password" autocomplete="current-password">
    </div>
    <button class="submit-btn" onclick="login()">Login to Dashboard</button>
    <div id="msg"></div>
  </div>
</div>

<footer>
  <span class="footer-brand-name">© 2026 <strong>Ultra College</strong> — Dental Camp Report System</span>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="userlogin.html">User Login</a>
    <a href="adminlogin.html">Admin Login</a>
  </div>
</footer>

<script>
const BASE = "https://prototype-backend-657r.onrender.com";

async function login() {
  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();
  if (!u || !p) { document.getElementById("msg").innerText = "Please fill all fields"; return; }

  document.querySelector("button").textContent = "Logging in…";
  document.querySelector("button").disabled = true;

  try {
    const res = await fetch(BASE + "/api/admin/login", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = BASE + "/page/admin";
    } else {
      document.getElementById("msg").innerText = "Invalid Admin Credentials";
      document.querySelector("button").textContent = "Login to Dashboard";
      document.querySelector("button").disabled = false;
    }
  } catch (err) {
    document.getElementById("msg").innerText = "Server error. Please try again.";
    document.querySelector("button").textContent = "Login to Dashboard";
    document.querySelector("button").disabled = false;
  }
}

document.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
